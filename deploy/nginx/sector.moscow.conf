# Nginx: sector.moscow (фронт) + api.sector.moscow (бэкенд)
# Разместить в /etc/nginx/sites-available/, симлинк в sites-enabled.
# Пути к сертификатам — после certbot: certbot --nginx -d sector.moscow -d www.sector.moscow -d api.sector.moscow

# --- Фронт: https://sector.moscow и https://www.sector.moscow ---

server {
    listen 80;
    listen [::]:80;
    server_name sector.moscow www.sector.moscow;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sector.moscow www.sector.moscow;

    ssl_certificate     /etc/letsencrypt/live/sector.moscow/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sector.moscow/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Проксирование API на бэкенд (фронт может ходить на /api при VITE_API_URL не задан)
    location /api/ {
        proxy_pass http://127.0.0.1:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Telegram mini app (https://sector.moscow/tg)
    # Перенаправляем /tg без слеша на /tg/
    location = /tg {
        return 301 /tg/;
    }

    # Отдаём собранный tg-miniapp из отдельного dist.
    # ^~ — чтобы этот location имел приоритет над regex-локейшеном для .js/.css ниже.
    location ^~ /tg/ {
        alias /var/www/sector/tg-miniapp/dist/;
        index index.html;
        try_files $uri $uri/ /index.html;

        # ВАЖНО: мини‑приложение Telegram открывается внутри iframe на домене t.me.
        # Заголовок X-Frame-Options "SAMEORIGIN" из server‑блока блокирует такую встраиваемость,
        # из‑за чего Telegram открывает страницу просто как сайт без Telegram.WebApp.
        # Переопределяем заголовок внутри /tg/, чтобы iframe мог работать.
        add_header X-Frame-Options "" always;
    }

    # Socket.IO на том же домене (если фронт ходит на sector.moscow, а не api.sector.moscow)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Путь к собранному фронту (npm run build в sector-web)
    root /var/www/sector/sector-web/dist;
    index index.html;
    try_files $uri $uri/ /index.html;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}

# --- API + Socket.io: https://api.sector.moscow ---

server {
    listen 80;
    listen [::]:80;
    server_name api.sector.moscow;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.sector.moscow;

    ssl_certificate     /etc/letsencrypt/live/sector.moscow/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sector.moscow/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
