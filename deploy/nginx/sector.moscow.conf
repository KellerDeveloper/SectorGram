# Nginx: sector.moscow (фронт) + api.sector.moscow (бэкенд)
# Разместить в /etc/nginx/sites-available/, симлинк в sites-enabled.
# Пути к сертификатам — после certbot: certbot --nginx -d sector.moscow -d www.sector.moscow -d api.sector.moscow

# Путь к собранному фронту (npm run build в sector-web)
# На сервере: склонировать репо, выполнить в sector-web: npm ci && npm run build
set $frontend_root /var/www/sector/sector-web/dist;

# --- Фронт: https://sector.moscow и https://www.sector.moscow ---

server {
    listen 80;
    listen [::]:80;
    server_name sector.moscow www.sector.moscow;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sector.moscow www.sector.moscow;

    ssl_certificate     /etc/letsencrypt/live/sector.moscow/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sector.moscow/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root $frontend_root;
    index index.html;
    try_files $uri $uri/ /index.html;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}

# --- API + Socket.io: https://api.sector.moscow ---

server {
    listen 80;
    listen [::]:80;
    server_name api.sector.moscow;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.sector.moscow;

    ssl_certificate     /etc/letsencrypt/live/sector.moscow/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sector.moscow/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
