# sector.moscow — SSL/HTTPS. Сертификат: certbot --nginx -d sector.moscow -d www.sector.moscow

# HTTP — редирект на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name sector.moscow www.sector.moscow;
    return 301 https://$server_name$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    ssl_certificate     /etc/letsencrypt/live/sector.moscow/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sector.moscow/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /var/www/html;
    index index.html;

    server_name sector.moscow www.sector.moscow;

    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }
}
