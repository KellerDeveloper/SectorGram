# Пример конфига nginx для sector.moscow
# Скопируйте на сервер и подключите:
#   sudo cp nginx-sector.moscow.example.conf /etc/nginx/sites-available/sector.moscow
#   sudo ln -sf /etc/nginx/sites-available/sector.moscow /etc/nginx/sites-enabled/
#   sudo rm /etc/nginx/sites-enabled/default   # если default больше не нужен
#   sudo nginx -t && sudo systemctl reload nginx
#
# Либо скопируйте содержимое в /etc/nginx/sites-available/default

# HTTP — редирект на HTTPS (раскомментируйте, если есть SSL)
# server {
#     listen 80;
#     listen [::]:80;
#     server_name sector.moscow www.sector.moscow;
#     return 301 https://$server_name$request_uri;
# }

# HTTP (если SSL пока не настроен)
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/html;
    index index.html;

    server_name sector.moscow www.sector.moscow _;

    # Не кэшировать главную и index.html — после деплоя сразу видна новая версия
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }
}

